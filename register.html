<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register Vehicle | SCANME</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<div class="logo">
<a href="index.html">SCANME</a>
</div>

</header>


<main>

<section class="register">

<h2>Register Your Vehicle</h2>

<p>Create your SCANME vehicle identity</p>

<form id="vehicleForm">

<input type="text" id="ownerName" placeholder="Owner Name" required>

<input type="text" id="vehicleNumber" placeholder="Vehicle Number" required>

<input type="text" id="vehicleType" placeholder="Vehicle Type" required>

<input type="tel" id="mobile" placeholder="Mobile Number" required>

<input type="email" id="email" placeholder="Email" required>

<button type="submit" class="primary-btn">
Create Vehicle ID
</button>

</form>

<h3 id="result"></h3>

</section>

</main>


<script src="assets/app.js"></script>

</body>
</html>
