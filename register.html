<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Register Vehicle | SCANME
</title>


<link rel="stylesheet" href="style.css">


</head>


<body>



<header class="header">

<div class="logo">

<a href="index.html">
SCANME
</a>

</div>


</header>





<section class="register">


<h1>
Register Your Vehicle
</h1>


<p>
Create your secure SCANME vehicle identity
</p>





<form id="vehicleForm">



<input 
type="text"
id="ownerName"
placeholder="Owner Name"
required
>



<input 
type="text"
id="vehicleNumber"
placeholder="Vehicle Number"
required
>



<input 
type="text"
id="vehicleType"
placeholder="Vehicle Type (Car/Bike)"
required
>



<input 
type="tel"
id="mobile"
placeholder="Mobile Number"
required
>




<input 
type="email"
id="email"
placeholder="Email"
required
>




<button 
type="submit"
class="primary-btn"
>

Create Vehicle ID

</button>



</form>




<h2 id="result"></h2>




</section>





<script src="assets/app.js"></script>


</body>

</html>
